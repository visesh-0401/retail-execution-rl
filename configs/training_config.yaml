training:
  timesteps: 50000          # Per seed, ~30 min on Kaggle GPU
  n_seeds: 5                # 5 random seeds for robustness
  batch_size: 64
  learning_rate: 3e-4       # Baseline
  n_steps: 2048
  n_epochs: 10
  gamma: 0.99
  verbose: 1

# Hyperparameter search (Week 7)
hyperparameters:
  learning_rates: [1e-4, 3e-4, 1e-3]  # Session 2 tests these
  
# Data configuration
data:
  all_stocks: ['AAPL', 'MSFT', 'GOOGL', 'TSLA', 'SPY', 'QQQ']
  train_stocks: ['AAPL', 'MSFT', 'GOOGL']  # Session 1: only AAPL + MSFT
  test_stocks: ['TSLA', 'SPY', 'QQQ']      # Session 2: test on these
  date_start: '2025-09-01'
  date_end: '2026-03-01'
  
# API constraints to test
api_limits: [1, 5, 10]  # Week 8 ablation study

# Reward function weights
reward:
  slippage_weight: 1.0       # Cost of execution
  api_penalty_weight: 10.0   # Cost of using API requests
  
# Training environment
environment:
  execution_window_minutes: 60
  random_seed: 42
  
# Evaluation
evaluation:
  test_episodes: 5           # Per model, per stock
  seeds: [42, 123, 456]      # For reproducibility
